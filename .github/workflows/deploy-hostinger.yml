name: Deploy to Hostinger

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-hostinger-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            cd "${{ secrets.HOSTINGER_PROJECT_PATH }}"

            git fetch origin main
            git reset --hard origin/main

            pnpm install --frozen-lockfile
            pnpm deploy:prepare

            if [ -n "${{ secrets.HOSTINGER_RESTART_COMMAND }}" ]; then
              ${{ secrets.HOSTINGER_RESTART_COMMAND }}
            elif command -v pm2 >/dev/null 2>&1; then
              pm2 reload portfolio || pm2 start pnpm --name portfolio -- start
            else
              echo "Build completed. No restart command configured."
              echo "Set HOSTINGER_RESTART_COMMAND if your Hostinger app needs a manual restart."
            fi
