name: CI

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - ".agents/**"
      - ".githooks/**"
      - ".github/workflows/ci.yml"
      - "skills-lock.json"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write
  issues: write

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('ci-{0}', github.event.pull_request.number) || 'deploy-frontend-production' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-and-build:
    name: Lint and build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || '' }}
      BUILD_API_BASE_URL: ${{ vars.BUILD_API_BASE_URL }}
      FRONTEND_API_BASE_URL: ${{ vars.FRONTEND_API_BASE_URL }}
      PORTFOLIO_API_TIMEOUT_MS: ${{ vars.PORTFOLIO_API_TIMEOUT_MS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate rollout preflight
        id: preflight
        run: |
          set -euo pipefail
          test -f Dockerfile
          test -f .dockerignore
          test -r .github/scripts/smoke-test-image.sh
          test -f .github/workflows/ci.yml
          test -r .github/scripts/report-deploy-failure.sh
          bun run env:check

      - name: Run Biome
        id: lint
        run: bun run lint

      - name: Run tests
        id: test
        run: bun run test

      - name: Build Next.js app
        id: build
        run: bun run build

      - name: Smoke test standalone runtime
        id: runtime-smoke
        run: |
          set -euo pipefail
          log_file="$(mktemp)"
          server_pid=""

          cleanup() {
            if [ -n "$server_pid" ] && kill -0 "$server_pid" 2>/dev/null; then
              kill -TERM "$server_pid" 2>/dev/null || true
              wait "$server_pid" 2>/dev/null || true
            fi
            rm -f "$log_file"
          }
          trap cleanup EXIT

          install -d .next/standalone/public .next/standalone/.next/static
          cp -R public/. .next/standalone/public/
          cp -R .next/static/. .next/standalone/.next/static/

          static_asset="$(
            node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const root = ".next/standalone/.next/static";
          const directories = [root];
          let file = "";

          while (directories.length > 0 && !file) {
            const directory = directories.shift();
            for (const entry of fs.readdirSync(directory, { withFileTypes: true })) {
              const candidate = path.join(directory, entry.name);
              if (entry.isDirectory()) directories.push(candidate);
              else {
                file = candidate;
                break;
              }
            }
          }

          if (!file) process.exit(1);
          const relative = path.relative(root, file).split(path.sep).join("/");
          console.log(`/_next/static/${relative}`);
          NODE
          )"
          test -n "$static_asset"

          PORT=3100 HOSTNAME=127.0.0.1 node .next/standalone/server.js >"$log_file" 2>&1 &
          server_pid=$!

          for attempt in $(seq 1 30); do
            if ! kill -0 "$server_pid" 2>/dev/null; then
              echo "Standalone server exited before becoming ready" >&2
              cat "$log_file" >&2
              exit 1
            fi

            if curl -fsS --max-time 5 http://127.0.0.1:3100/robots.txt >/dev/null \
              && curl -fsS --max-time 5 "http://127.0.0.1:3100${static_asset}" >/dev/null; then
              echo "Standalone runtime smoke test passed"
              exit 0
            fi

            sleep 1
          done

          echo "Standalone runtime did not become ready within 30 seconds" >&2
          cat "$log_file" >&2
          exit 1

      - name: Publish rollout readiness summary
        if: always()
        env:
          PREFLIGHT_OUTCOME: ${{ steps.preflight.outcome }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          SMOKE_OUTCOME: ${{ steps.runtime-smoke.outcome }}
        run: |
          if [ "$PREFLIGHT_OUTCOME" = success ] \
            && [ "$LINT_OUTCOME" = success ] \
            && [ "$TEST_OUTCOME" = success ] \
            && [ "$BUILD_OUTCOME" = success ] \
            && [ "$SMOKE_OUTCOME" = success ]; then
            decision="GO — ready for immutable image build and deployment after merge"
          else
            decision="NO-GO — resolve failed or skipped checks before merge"
          fi

          {
            echo "## Rollout readiness"
            echo
            echo "| Gate | Outcome |"
            echo "| --- | --- |"
            echo "| Preflight | $PREFLIGHT_OUTCOME |"
            echo "| Biome | $LINT_OUTCOME |"
            echo "| Tests | $TEST_OUTCOME |"
            echo "| Next.js build | $BUILD_OUTCOME |"
            echo "| Standalone runtime smoke | $SMOKE_OUTCOME |"
            echo
            echo "**Decision:** $decision"
            echo
            echo "Production deployment remains gated by the exact-image smoke test, public health verification, and automatic rollback in the production jobs below."
          } >> "$GITHUB_STEP_SUMMARY"

  react-doctor:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write
      statuses: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: millionco/react-doctor@938008119a288f2fb47c66a69cd9279a21f31784 # v2.2.7
        with:
          version: "0.5.8"
        # Advisory by default: React Doctor reports findings on every PR — a
        # sticky summary comment, inline review comments, and a commit status
        # with the health score — but never fails the check, so it won't red-X
        # a teammate's PR on day one. When your team trusts the signal, graduate
        # the gate by adding `blocking: error` under `with` above (fail on new
        # error-severity findings) or `blocking: warning` (fail on any finding).
        # Full reference: https://www.react.doctor/ci
        # Additional inputs:
        #   blocking: error          # Gate level: "none" (advisory, the default) | "warning" | "error"
        #   scope: full              # On PRs, scan the whole project instead of just changed files
        #   comment: false           # Disable the sticky PR summary comment
        #   review-comments: false   # Disable inline review comments on changed lines
        #   commit-status: false     # Disable the commit status (score + counts, links to the run)
        #   version: "0.4.0"         # Pin to a specific react-doctor version instead of "latest"
        #   directory: apps/web      # Scan a sub-directory (default: ".")
        #   project: "web,admin"     # In a monorepo, scan specific workspace project(s)

  # ==================================================================
  # DEPLOYMENT PREFLIGHT — window guard, rollback worthiness, infra check
  # ==================================================================
  deploy-preflight:
    name: Preflight (window + rollback + infra)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      window_ok: ${{ steps.window-check.outputs.window_ok }}
      previous_image: ${{ steps.rollback-worthiness.outputs.previous_image }}
    steps:
      - name: Check deployment window
        id: window-check
        env:
          FORCE_DEPLOY: ${{ secrets.FORCE_DEPLOY_WINDOW_OVERRIDE }}
        run: |
          set -euo pipefail
          if [ "${FORCE_DEPLOY:-false}" = "true" ]; then
            echo "window_ok=true" >> "$GITHUB_OUTPUT"
            echo "🟢 Deployment window guard bypassed via FORCE_DEPLOY_WINDOW_OVERRIDE"
            exit 0
          fi
          day_of_week=$(date -u +%u)
          hour_utc=$(date -u +%H)
          minute_utc=$(date -u +%M)
          # Blocked: Fri >= 15:00 UTC → Sun 23:00 UTC, and Mon before 06:00 UTC
          if [ "$day_of_week" -eq 5 ] && { [ "$hour_utc" -gt 15 ] || { [ "$hour_utc" -eq 15 ] && [ "$minute_utc" -ge 0 ]; }; }; then
            echo "window_ok=false" >> "$GITHUB_OUTPUT"
            echo "❌ Deployment window blocked: Friday after 15:00 UTC"
            exit 1
          fi
          if [ "$day_of_week" -eq 6 ] || [ "$day_of_week" -eq 7 ]; then
            echo "window_ok=false" >> "$GITHUB_OUTPUT"
            echo "❌ Deployment window blocked: weekend"
            exit 1
          fi
          if [ "$day_of_week" -eq 1 ] && { [ "$hour_utc" -lt 6 ]; }; then
            echo "window_ok=false" >> "$GITHUB_OUTPUT"
            echo "❌ Deployment window blocked: Monday before 06:00 UTC"
            exit 1
          fi
          echo "window_ok=true" >> "$GITHUB_OUTPUT"
          echo "🟢 Deployment window OK ($(date -u -Iseconds))"

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify rollback worthiness
        id: rollback-worthiness
        env:
          IMAGE_REPO: ghcr.io/panyakorn04/portfolio-2026
        run: |
          set -euo pipefail
          last_successful=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?per_page=5&status=success&event=push" \
            --jq '.workflow_runs[0].head_sha // ""' 2>/dev/null || true)
          if [ -n "$last_successful" ] && [ "$last_successful" != "$GITHUB_SHA" ]; then
            previous_tag="${last_successful:0:7}"
            echo "Checking rollback image: ${IMAGE_REPO}:${previous_tag}"
            if docker manifest inspect "${IMAGE_REPO}:${previous_tag}" >/dev/null 2>&1; then
              echo "previous_image=${IMAGE_REPO}:${previous_tag}" >> "$GITHUB_OUTPUT"
              echo "🟢 Rollback image available: ${IMAGE_REPO}:${previous_tag}"
            else
              echo "previous_image=" >> "$GITHUB_OUTPUT"
              echo "⚠️ Previous image not found in GHCR; rollback will use :latest"
            fi
          else
            echo "previous_image=" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No previous successful deployment found; first deploy assumed"
          fi

      - name: Verify registry connectivity
        run: |
          set -euo pipefail
          # Check GHCR is reachable — /v2/ returns 401 without auth, which is fine
          http_code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "https://ghcr.io/v2/" || echo "000")
          if [ "$http_code" = "000" ]; then
            echo "❌ GHCR unreachable (no response)"
            exit 1
          fi
          echo "🟢 GHCR reachable (HTTP ${http_code})"

  # ==================================================================
  # APPROVAL GATE — manual approval before production deploy
  # ==================================================================
  deploy-approval:
    name: Approval gate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [deploy-preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 4320  # 72h
    environment:
      name: production
      url: https://panyakorn.com
    steps:
      - name: Awaiting manual approval
        run: |
          echo "## ⏳ Deployment approval requested" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Preflight Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deployment window | ${{ needs.deploy-preflight.outputs.window_ok == 'true' && '✅ Pass' || '❌ Fail' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Rollback image | ${{ needs.deploy-preflight.outputs.previous_image || '⚠️ None (first deploy)' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry connectivity | ✅ Pass |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Preflight checks passed. Review and approve via Environments to deploy." >> "$GITHUB_STEP_SUMMARY"

  # ==================================================================
  # BUILD AND SMOKE TEST — runs on PR + push; builds Docker image and verifies it
  # ==================================================================
  build-and-smoke:
    name: Build and smoke test
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_REPO: ghcr.io/panyakorn04/portfolio-2026
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set short SHA
        id: vars
        run: |
          echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome
        run: bun run lint

      - name: Run tests
        run: bun run test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:latest
            ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REPO }}:${{ steps.vars.outputs.SHORT_SHA }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || '' }}
            BUILD_API_BASE_URL=${{ vars.BUILD_API_BASE_URL }}
            FRONTEND_API_BASE_URL=${{ vars.FRONTEND_API_BASE_URL }}
            PORTFOLIO_API_TIMEOUT_MS=${{ vars.PORTFOLIO_API_TIMEOUT_MS }}
          cache-from: type=gha

      - name: Smoke test exact image
        run: bash .github/scripts/smoke-test-image.sh "${IMAGE_REPO}:${IMAGE_TAG}"

  # ==================================================================
  # DEPLOY TO VPS — runs after preflight + approval (push/main only)
  # ==================================================================
  deploy-to-vps:
    name: Deploy to VPS
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [deploy-approval, build-and-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      deployments: write
    env:
      IMAGE_REPO: ghcr.io/panyakorn04/portfolio-2026
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Notify deployment start
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK_URL:-}" ]; then
            echo "No webhook URL configured — skipping notification"
            exit 0
          fi
          curl -fsS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jo \
              content="🚀 Portfolio-2026 deployment starting" \
              embeds="$(jo -a "$(jo \
                title="Commit: ${GITHUB_SHA:0:7}" \
                url="https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}" \
                description="Branch: ${GITHUB_REF_NAME} | Preflight ✅ | Awaiting deploy..." \
                color=3066993 \
              )")" \
            )" 2>/dev/null || echo "⚠️ Webhook notification skipped (curl/jo error)"

      - name: Prepare pinned SSH client
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy frontend service
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          FRONTEND_IMAGE: ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ssh_opts=(
            -i "$HOME/.ssh/deploy_key"
            -o BatchMode=yes
            -o StrictHostKeyChecking=yes
            -o HostKeyAlias="$VPS_HOST"
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
            -o ConnectTimeout=30
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
          )

          for attempt in 1 2 3; do
            echo "Deploy SSH attempt ${attempt}/3"
            if {
              printf '%s\n' "$GHCR_TOKEN"
              printf '%s\n' "$FRONTEND_IMAGE"
              cat <<'REMOTE_SCRIPT'
          set -euo pipefail
          cd /opt/apps
          exec 9>/opt/apps/.production-deploy.lock
          flock -w 600 9

          docker_config=$(mktemp -d)
          cleanup() {
            rm -rf "$docker_config"
          }
          trap cleanup EXIT
          export DOCKER_CONFIG="$docker_config"

          echo "$GHCR_TOKEN" | docker login ghcr.io -u panyakorn04 --password-stdin >/dev/null
          previous_image=$(docker inspect frontend --format '{{.Config.Image}}' 2>/dev/null || true)
          docker pull "$FRONTEND_IMAGE"
          FRONTEND_IMAGE="$FRONTEND_IMAGE" sudo docker compose up -d --no-deps --force-recreate frontend

          # ── Phase 1: Immediate health check (0-1 min) ──
          echo "Phase 1/3: Immediate health check"
          for health_attempt in $(seq 1 20); do
            if curl -fsS --max-time 10 https://panyakorn.com/th >/dev/null; then
              docker image prune -f >/dev/null
              echo "Frontend deployment initial health: PASS"
              break
            fi
            if [ "$health_attempt" -eq 20 ]; then
              echo "Phase 1 failed — escalating to rollback" >&2
              break 2
            fi
            sleep 3
          done

          # ── Phase 2: Short-term verification (1-3 min) ──
          echo "Phase 2/3: Short-term sustained observation (3 checks @ 30s)"
          short_term_ok=true
          for st_attempt in $(seq 1 3); do
            sleep 30
            if curl -fsS --max-time 10 https://panyakorn.com/th >/dev/null; then
              echo "  Short-term check ${st_attempt}/3: OK"
            else
              echo "  Short-term check ${st_attempt}/3: FAIL" >&2
              short_term_ok=false
            fi
          done
          if [ "$short_term_ok" = false ]; then
            echo "Phase 2 failed — initiating rollback" >&2
            break 2
          fi
          echo "Phase 2 complete: short-term stability verified"

          # ── Phase 3: Medium-term verification (3-8 min) ──
          echo "Phase 3/3: Medium-term sustained observation (5 checks @ 60s)"
          medium_term_ok=true
          for mt_attempt in $(seq 1 5); do
            sleep 60
            if curl -fsS --max-time 10 https://panyakorn.com/th >/dev/null; then
              echo "  Medium-term check ${mt_attempt}/5: OK"
            else
              echo "  Medium-term check ${mt_attempt}/5: FAIL" >&2
              medium_term_ok=false
            fi
          done
          if [ "$medium_term_ok" = false ]; then
            echo "Phase 3 failed — initiating rollback" >&2
            break 2
          fi
          echo "Phase 3 complete: sustained stability verified"
          echo "✅ ALL PHASES PASSED — deployment healthy: $FRONTEND_IMAGE"
          exit 0

          # ── Rollback procedure ──
          echo "Initiating rollback" >&2
          previous_image=$(docker inspect frontend --format '{{.Config.Image}}' 2>/dev/null || true)
          if [ -n "$previous_image" ] && [ "$previous_image" != "$FRONTEND_IMAGE" ]; then
            echo "Rolling back frontend to $previous_image" >&2
            FRONTEND_IMAGE="$previous_image" docker compose up -d --no-deps frontend
            for rollback_attempt in $(seq 1 10); do
              if curl -fsS --max-time 10 https://panyakorn.com/th >/dev/null; then
                echo "Rollback healthy: $previous_image" >&2
                break
              fi
              sleep 3
            done
          else
            echo "No previous image to rollback to" >&2
          fi
          exit 1
          REMOTE_SCRIPT
            } | ssh "${ssh_opts[@]}" "$VPS_USER@$VPS_HOST" \
              'read -r GHCR_TOKEN; read -r FRONTEND_IMAGE; export GHCR_TOKEN FRONTEND_IMAGE; bash -s'; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 15))
            fi
          done

          echo "Deployment failed after 3 SSH attempts" >&2
          exit 1

      - name: Notify deployment outcome
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_RESULT: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK_URL:-}" ]; then
            echo "No webhook URL configured — skipping notification"
            exit 0
          fi
          if [ "$DEPLOY_RESULT" = "success" ]; then
            discord_color=3066993
            content="✅ Portfolio-2026 deployment succeeded"
          else
            discord_color=15548997
            content="❌ Portfolio-2026 deployment failed"
          fi
          curl -fsS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jo \
              content="$content" \
              embeds="$(jo -a "$(jo \
                title="Commit: ${GITHUB_SHA:0:7}" \
                url="https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}" \
                description="Result: ${DEPLOY_RESULT} | Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
                color="$discord_color" \
              )")" \
            )" 2>/dev/null || echo "⚠️ Webhook notification skipped"

      - name: Post-deployment summary
        if: always()
        run: |
          {
            echo "## 📋 Post-deployment summary"
            echo ""
            echo "| Item | Detail |"
            echo "| --- | --- |"
            echo "| Commit | ${GITHUB_SHA:0:7} |"
            echo "| Branch | ${GITHUB_REF_NAME} |"
            echo "| Trigger | ${GITHUB_EVENT_NAME} |"
            echo "| Image | ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }} |"
            echo "| Status | ${{ job.status }} |"
            echo "| Preflight window | ${{ needs.deploy-preflight.outputs.window_ok }} |"
            echo "| Rollback image | ${{ needs.deploy-preflight.outputs.previous_image || 'N/A' }} |"
            echo "| Run URL | https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} |"
            echo ""
            if [ "${{ job.status }}" = "success" ]; then
              echo "**✅ Deployment completed successfully.**"
              echo "- Immediate verification: passed (health check after deploy)"
              echo "- Short-term verification: passed (3 checks @ 30s)"
              echo "- Medium-term verification: passed (5 checks @ 60s)"
              echo ""
              echo "**Post-deployment tasks (next 24h):**"
              echo "- [ ] Monitor error rates at https://panyakorn.com"
              echo "- [ ] Verify no regressions in 1h, 6h, 24h"
              echo "- [ ] Check API integration health"
            else
              echo "**❌ Deployment failed.** Review the rollback logs above."
            fi
            echo ""
            echo "*Auto-generated by ci.yml | $(date -u -Iseconds)*"
          } >> "$GITHUB_STEP_SUMMARY"

  report-deploy-failure:
    name: Report failure to Agent Loop (qwen2.5-coder)
    needs: deploy-to-vps
    if: always() && needs.deploy-to-vps.result == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run failure reporter
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/report-deploy-failure.sh
