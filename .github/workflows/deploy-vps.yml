name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/panyakorn04/portfolio-2026:latest

concurrency:
  group: deploy-frontend-production
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  packages: write

jobs:
  build-test-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome
        run: bun run lint

      - name: Build Next.js app
        env:
          NEXT_PUBLIC_SITE_URL: https://panyakorn.com
          NEXT_PUBLIC_API_URL: ""
          BUILD_API_BASE_URL: https://api.panyakorn.com
          FRONTEND_API_BASE_URL: http://backend:8888
          PORTFOLIO_API_TIMEOUT_MS: 3000
        run: bun run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=https://panyakorn.com
            NEXT_PUBLIC_API_URL=
            BUILD_API_BASE_URL=https://api.panyakorn.com
            FRONTEND_API_BASE_URL=http://backend:8888
            PORTFOLIO_API_TIMEOUT_MS=3000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy frontend service
        uses: appleboy/ssh-action@v1.0.3
        env:
          FRONTEND_IMAGE: ${{ secrets.FRONTEND_IMAGE }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: FRONTEND_IMAGE
          script: |
            set -euo pipefail
            cd /opt/apps
            docker pull "$FRONTEND_IMAGE"
            FRONTEND_IMAGE="$FRONTEND_IMAGE" docker compose up -d frontend caddy
            docker exec caddy caddy reload --config /etc/caddy/Caddyfile
            docker image prune -f

  report-deploy-failure:
    name: Report failure to Agent Loop (qwen2.5-coder)
    needs: build-test-deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Analyze failure with qwen2.5-coder:7b
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA:0:7}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          COMMIT_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"

          echo "=== Collecting failure logs ==="
          FAIL_LOGS=$(gh run view "$GITHUB_RUN_ID" --log-failed 2>/dev/null | tail -90 || echo "Logs unavailable")
          FAIL_LOGS=$(printf "%s" "$FAIL_LOGS" | head -c 5200)

          # Quick classification (from skill reference)
          if echo "$FAIL_LOGS" | grep -qiE "timeout|connection refused|ssh: connect|dial tcp.*22"; then
            echo "Note: Possible transient network/SSH issue detected"
            FAIL_LOGS="TRANSIENT? ${FAIL_LOGS}"
          fi

          echo "=== Finding or creating issue ==="
          EXISTING=$(gh issue list \
            --repo "${GITHUB_REPOSITORY}" \
            --state open \
            --label "deploy-failure,agent-loop" \
            --json number,title \
            --jq ".[] | select(.title | contains(\"${SHORT_SHA}\")) | .number" | head -1 || true)

          if [ -n "$EXISTING" ]; then
            ISSUE_NUMBER="$EXISTING"
            echo "Reusing issue #$ISSUE_NUMBER"
          else
            ISSUE_URL=$(gh issue create \
              --repo "${GITHUB_REPOSITORY}" \
              --title "🚨 Deploy Frontend failed: ${SHORT_SHA}" \
              --body "## Deploy Failure — Agent Loop Feedback

**Commit:** [${SHORT_SHA}](${COMMIT_URL})
**Run:** [Open logs & jobs](${RUN_URL})
**Triggered by:** ${GITHUB_EVENT_NAME}

**Analysis model:** qwen2.5-coder:7b

### Agent Loop Instructions
1. Read the AI analysis comment that will be posted below.
2. Apply the smallest possible fix.
3. Commit and push.
4. The workflow will run again automatically.
5. Repeat until the deploy is green.


