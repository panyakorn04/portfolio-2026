name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/panyakorn04/portfolio-2026:latest

concurrency:
  group: deploy-frontend-production
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  packages: write

jobs:
  build-test-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome
        run: bun run lint

      - name: Build Next.js app
        env:
          NEXT_PUBLIC_SITE_URL: https://panyakorn.com
          NEXT_PUBLIC_API_URL: ""
          BUILD_API_BASE_URL: https://api.panyakorn.com
          FRONTEND_API_BASE_URL: http://backend:8888
          PORTFOLIO_API_TIMEOUT_MS: 3000
        run: bun run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=https://panyakorn.com
            NEXT_PUBLIC_API_URL=
            BUILD_API_BASE_URL=https://api.panyakorn.com
            FRONTEND_API_BASE_URL=http://backend:8888
            PORTFOLIO_API_TIMEOUT_MS=3000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy frontend service
        uses: appleboy/ssh-action@v1.0.3
        env:
          FRONTEND_IMAGE: ${{ secrets.FRONTEND_IMAGE }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: FRONTEND_IMAGE
          script: |
            set -euo pipefail
            cd /opt/apps
            docker pull "$FRONTEND_IMAGE"
            FRONTEND_IMAGE="$FRONTEND_IMAGE" docker compose up -d frontend caddy
            docker exec caddy caddy reload --config /etc/caddy/Caddyfile
            docker image prune -f

  report-deploy-failure:
    name: Report failure to Agent Loop (qwen2.5-coder)
    needs: build-test-deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Analyze failure with qwen2.5-coder:7b
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA:0:7}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          COMMIT_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"

          echo "=== Collecting failure logs ==="
          FAIL_LOGS=$(gh run view "$GITHUB_RUN_ID" --log-failed 2>/dev/null | tail -90 || echo "Logs unavailable")
          FAIL_LOGS=$(printf "%s" "$FAIL_LOGS" | head -c 5200)

          echo "=== Finding or creating issue ==="
          EXISTING=$(gh issue list \
            --repo "${GITHUB_REPOSITORY}" \
            --state open \
            --label "deploy-failure,agent-loop" \
            --json number,title \
            --jq ".[] | select(.title | contains(\"${SHORT_SHA}\")) | .number" | head -1 || true)

          if [ -n "$EXISTING" ]; then
            ISSUE_NUMBER="$EXISTING"
            echo "Reusing issue #$ISSUE_NUMBER"
          else
            ISSUE_URL=$(gh issue create \
              --repo "${GITHUB_REPOSITORY}" \
              --title "🚨 Deploy Frontend failed: ${SHORT_SHA}" \
              --body "## Deploy Failure — Agent Loop Feedback

**Commit:** [${SHORT_SHA}](${COMMIT_URL})
**Run:** [Open logs & jobs](${RUN_URL})
**Triggered by:** ${GITHUB_EVENT_NAME}

**Model used for analysis:** qwen2.5-coder:7b (via backend /api/ai/chat)

### Instructions for the agent
1. Read the AI analysis comment that will be posted below.
2. Apply the smallest possible fix.
3. Commit and push.
4. The workflow will run again automatically.
5. Repeat until the deploy is green.

" \
              --label "deploy-failure,agent-loop,needs-fix")
            ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -o '[0-9]*$')
            echo "Created issue #$ISSUE_NUMBER"
          fi

          echo "=== Calling backend with qwen2.5-coder:7b (with retry) ==="

          # === STRICT SYSTEM PROMPT ===
          SYSTEM='You are a strict and precise DevOps + software engineer.

MANDATORY RULES (you will be judged on these):
- Output MUST start with exactly these 4 headings and NOTHING before them.
- Output MUST end after the last heading. No extra paragraphs, no "In conclusion", no "Hope this helps".
- Be extremely concise. One or two sentences per section max unless a diff is needed.
- Always prefer the smallest possible change (workflow YAML > docker args > code change).
- If you cannot identify the root cause with high confidence from the provided logs, explicitly write: "Low confidence - logs are insufficient".
- Never use vague language like "probably", "might be", "I think". Be direct.
- Use proper markdown code blocks for any commands or file edits.

EXACT OUTPUT FORMAT REQUIRED (copy this structure exactly):

### Root Cause
(1-2 sentences. Be specific about the error.)

### Recommended Fix
(Describe the smallest change. If code change, show a minimal diff or exact replacement.)

### Files / Steps
- List exact file paths or workflow steps to edit

### How to Verify
```bash
exact commands to run
```'

          USER_BASE="The Next.js frontend deploy to VPS using GHCR just failed.

Run URL: ${RUN_URL}
Commit: ${SHORT_SHA}

Here are the truncated failure logs:

${FAIL_LOGS}

Analyze strictly according to the rules and output format above."

          MAX_RETRIES=3
          ATTEMPT=1
          ANALYSIS=""

          while [ $ATTEMPT -le $MAX_RETRIES ]; do
            echo "=== LLM attempt ${ATTEMPT}/${MAX_RETRIES} ==="

            USER_MSG="$USER_BASE"

            if [ $ATTEMPT -gt 1 ]; then
              USER_MSG="${USER_MSG}

This is retry attempt ${ATTEMPT}. Previous response was invalid or incomplete. Please follow the exact format strictly this time."
            fi

            jq -n \
              --arg model "qwen2.5-coder:7b" \
              --arg sys "$SYSTEM" \
              --arg usr "$USER_MSG" \
              '{ model: $model, messages: [ {role:"system", content:$sys}, {role:"user", content:$usr} ] }' \
              > /tmp/llm.json

            RESPONSE=$(curl -s --max-time 100 -X POST https://api.panyakorn.com/api/ai/chat \
              -H "Content-Type: application/json" \
              -d @/tmp/llm.json || echo '{"data":{"message":{"content":""}}}')

            ANALYSIS=$(echo "$RESPONSE" | jq -r '.data.message.content // ""' 2>/dev/null || echo "")

            # Validation: must contain the 3 critical headings + reasonable length
            if echo "$ANALYSIS" | grep -q "### Root Cause" && \
               echo "$ANALYSIS" | grep -q "### Recommended Fix" && \
               echo "$ANALYSIS" | grep -q "### How to Verify" && \
               [ ${#ANALYSIS} -gt 180 ]; then
              echo "✓ Valid structured response received on attempt ${ATTEMPT}"
              break
            else
              echo "✗ Invalid or incomplete response on attempt ${ATTEMPT}"
              ATTEMPT=$((ATTEMPT + 1))
              sleep 3
            fi
          done

          if [ -z "$ANALYSIS" ] || ! echo "$ANALYSIS" | grep -q "### Root Cause"; then
            ANALYSIS="**LLM did not return a valid structured response after ${MAX_RETRIES} attempts.**

Last raw output:
\`\`\`
${ANALYSIS:-<empty>}
\`\`\`

Please check the full logs in the workflow run and analyze manually."
          else
            ANALYSIS="${ANALYSIS}

---
*Attempts used: ${ATTEMPT}/${MAX_RETRIES}*"
          fi

          echo "=== Posting analysis as comment to issue #$ISSUE_NUMBER ==="
          gh issue comment "$ISSUE_NUMBER" \
            --repo "${GITHUB_REPOSITORY}" \
            --body "## 🤖 Analysis from qwen2.5-coder:7b (via backend)

$ANALYSIS

---
*Auto-generated by Deploy Agent Loop • Model: qwen2.5-coder:7b • Retries enabled*"

          echo "✅ Analysis posted to issue #$ISSUE_NUMBER (after ${ATTEMPT} attempt(s))"
