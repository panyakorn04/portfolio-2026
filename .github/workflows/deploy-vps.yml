name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_REPO: ghcr.io/panyakorn04/portfolio-2026
  IMAGE_TAG: ${{ github.sha }}

concurrency:
  group: deploy-frontend-production
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  issues: write
  packages: write

jobs:
  build-test-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: |
          echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome
        run: bun run lint

      - name: Build Next.js app
        env:
          NEXT_PUBLIC_SITE_URL: https://panyakorn.com
          # Keep empty so browser calls stay same-origin (/api/*) and are
          # rewritten server-side, avoiding cross-origin CORS to the API host.
          NEXT_PUBLIC_API_URL: ""
          BUILD_API_BASE_URL: https://api.panyakorn.com
          FRONTEND_API_BASE_URL: http://backend:8888
          PORTFOLIO_API_TIMEOUT_MS: 3000
        run: bun run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:latest
            ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REPO }}:${{ steps.vars.outputs.SHORT_SHA }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=https://panyakorn.com
            NEXT_PUBLIC_API_URL=
            BUILD_API_BASE_URL=https://api.panyakorn.com
            FRONTEND_API_BASE_URL=http://backend:8888
            PORTFOLIO_API_TIMEOUT_MS=3000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare pinned SSH client
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy frontend service
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          FRONTEND_IMAGE: ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ssh_opts=(
            -i "$HOME/.ssh/deploy_key"
            -o BatchMode=yes
            -o StrictHostKeyChecking=yes
            -o HostKeyAlias=76.13.185.117
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
            -o ConnectTimeout=30
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
          )

          for attempt in 1 2 3; do
            echo "Deploy SSH attempt ${attempt}/3"
            if {
              printf '%s\n' "$GHCR_TOKEN"
              printf '%s\n' "$FRONTEND_IMAGE"
              cat <<'REMOTE_SCRIPT'
          set -euo pipefail
          cd /opt/apps
          exec 9>/opt/apps/.production-deploy.lock
          flock -w 600 9

          docker_config=$(mktemp -d)
          cleanup() {
            rm -rf "$docker_config"
          }
          trap cleanup EXIT
          export DOCKER_CONFIG="$docker_config"

          echo "$GHCR_TOKEN" | docker login ghcr.io -u panyakorn04 --password-stdin >/dev/null
          previous_image=$(docker inspect frontend --format '{{.Config.Image}}' 2>/dev/null || true)
          docker pull "$FRONTEND_IMAGE"
          FRONTEND_IMAGE="$FRONTEND_IMAGE" docker compose up -d --no-deps frontend

          for health_attempt in $(seq 1 20); do
            if curl -fsS --max-time 10 https://panyakorn.com/th >/dev/null; then
              docker image prune -f >/dev/null
              echo "Frontend deployment healthy: $FRONTEND_IMAGE"
              exit 0
            fi
            sleep 3
          done

          echo "Frontend health gate failed" >&2
          if [ -n "$previous_image" ] && [ "$previous_image" != "$FRONTEND_IMAGE" ]; then
            echo "Rolling back frontend to $previous_image" >&2
            FRONTEND_IMAGE="$previous_image" docker compose up -d --no-deps frontend
            for rollback_attempt in $(seq 1 10); do
              if curl -fsS --max-time 10 https://panyakorn.com/th >/dev/null; then
                echo "Frontend rollback healthy: $previous_image" >&2
                break
              fi
              sleep 3
            done
          fi
          exit 1
          REMOTE_SCRIPT
            } | ssh "${ssh_opts[@]}" "$VPS_USER@$VPS_HOST" \
              'read -r GHCR_TOKEN; read -r FRONTEND_IMAGE; export GHCR_TOKEN FRONTEND_IMAGE; bash -s'; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 15))
            fi
          done

          echo "Deployment failed after 3 SSH attempts" >&2
          exit 1

  report-deploy-failure:
    name: Report failure to Agent Loop (qwen2.5-coder)
    needs: build-test-deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run failure reporter
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/report-deploy-failure.sh
