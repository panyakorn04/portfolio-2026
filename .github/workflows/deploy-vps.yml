name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/panyakorn04/portfolio-2026:latest

concurrency:
  group: deploy-frontend-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-test-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome
        run: pnpm lint

      - name: Build Next.js app
        env:
          NEXT_PUBLIC_SITE_URL: https://panyakorn.com
        run: pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image tar
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=https://panyakorn.com
          outputs: type=docker,dest=/tmp/portfolio-2026-frontend.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image tar to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: /tmp/portfolio-2026-frontend.tar
          target: /tmp
          strip_components: 1

      - name: Deploy frontend service
        uses: appleboy/ssh-action@v1.0.3
        env:
          FRONTEND_IMAGE: ${{ secrets.FRONTEND_IMAGE }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: FRONTEND_IMAGE
          script: |
            set -euo pipefail
            cd /opt/apps
            docker load -i /tmp/portfolio-2026-frontend.tar
            FRONTEND_IMAGE="$FRONTEND_IMAGE" docker compose up -d frontend caddy
            docker exec caddy caddy reload --config /etc/caddy/Caddyfile
            rm -f /tmp/portfolio-2026-frontend.tar
            docker image prune -f
