name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/panyakorn04/portfolio-2026:latest

concurrency:
  group: deploy-frontend-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-test-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome
        run: bun run lint

      - name: Build Next.js app
        env:
          NEXT_PUBLIC_SITE_URL: https://panyakorn.com
          NEXT_PUBLIC_API_URL: ""
          BUILD_API_BASE_URL: https://api.panyakorn.com
          FRONTEND_API_BASE_URL: http://backend:8888
          PORTFOLIO_API_TIMEOUT_MS: 3000
        run: bun run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=https://panyakorn.com
            NEXT_PUBLIC_API_URL=
            BUILD_API_BASE_URL=https://api.panyakorn.com
            FRONTEND_API_BASE_URL=http://backend:8888
            PORTFOLIO_API_TIMEOUT_MS=3000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy frontend service
        uses: appleboy/ssh-action@v1.0.3
        env:
          FRONTEND_IMAGE: ${{ secrets.FRONTEND_IMAGE }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: FRONTEND_IMAGE
          script: |
            set -euo pipefail
            cd /opt/apps
            docker pull "$FRONTEND_IMAGE"
            FRONTEND_IMAGE="$FRONTEND_IMAGE" docker compose up -d frontend caddy
            docker exec caddy caddy reload --config /etc/caddy/Caddyfile
            docker image prune -f
